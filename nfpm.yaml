name: "rpi-usb-ether-gadget"
arch: "any"
platform: "linux"
version: "1.0.0"
section: "default"
priority: "extra"
maintainer: "Paul Oberosler <paul.oberosler@raspberrypi.com>"
description: Configures USB Ethernet Gadget mode on Raspberry Pi OS. The default subnet is 10.12.194.1/28. Only supported on main power USB port.

conflicts:
  - "rpi-usb-ether-gadget-manual"

contents:
- src: ./usb-ether-gadget.conf
  dst: /etc/modules-load.d/usb-ether-gadget.conf
- src: ./g_ether.conf
  dst: /etc/modprobe.d/g_ether.conf
- src: ./10-usb.network
  dst: /etc/systemd/network/10-usb.network
- src: ./rpi-usb-ether-gadget.sh
  dst: /usr/bin/rpi-usb-ether-gadget

scripts:
  postinstall: ./postinstall.sh
  postremove: ./postremove.sh

deb:
  compression: zstd
