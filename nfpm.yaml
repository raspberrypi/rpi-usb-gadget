name: "rpi-usb-ether-gadget"
arch: "any"
platform: "linux"
version: "1.0.1"
section: "default"
priority: "extra"
maintainer: "Paul Oberosler <paul.oberosler@raspberrypi.com>"
description: Configures USB CDC Ethernet+Serial Gadget mode on Raspberry Pi OS. The default subnet is 10.12.194.1/28. Only supported on main power USB port.

conflicts:
  - "rpi-usb-ether-gadget-manual"

contents:
- src: ./usb-gadget.conf
  dst: /etc/modules-load.d/usb-gadget.conf
- src: ./g_ether.conf
  dst: /etc/modprobe.d/g_ether.conf

- src: ./10-usb.network
  dst: /etc/systemd/network/10-usb.network
- src: ./rpi-usb-gadget.sh
  dst: /usr/bin/rpi-usb-gadget
  file_info:
    mode: 0755

- src: ./host-hint.sh
  dst: /usr/libexec/rpi-usb-gadget/host-hint.sh
  file_info:
    mode: 0755
- src: ./99-rpi-usb-gadget-hint.rules
  dst: /etc/udev/rules.d/99-rpi-usb-gadget-hint.rules

scripts:
  postinstall: ./postinstall.sh
  postremove: ./postremove.sh

deb:
  compression: zstd
