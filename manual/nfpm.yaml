name: "usb-ether-gadget"
arch: "arm64"
platform: "linux"
version: "1.0.0"
section: "default"
priority: "extra"
maintainer: "Paul Oberosler <paul.oberosler@raspberrypi.com>"

contents:
- src: ./configure-usb-ether-gadget-once.sh
  dst: /usr/sbin/configure-usb-ether-gadget-once
- src: ./usb-ether-gadget-once.service
  dst: /etc/systemd/system/usb-ether-gadget-once.service
- src: /etc/systemd/system/usb-ether-gadget-once.service
  dst: /etc/systemd/system/usb-gadget.target.wants/usb-ether-gadget-once.service
  type: symlink
- src: ./usb-ether-gadget.conf
  dst: /etc/modules-load.d/usb-ether-gadget.conf
- src: ./10-usb0.network
  dst: /etc/systemd/network/10-usb0.network

deb:
  compression: zstd
